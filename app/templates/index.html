<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>बात-Cheet - Meeting Notes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <script>
      (() => {
        const theme = localStorage.getItem("momTheme");
        if (theme === "light") document.documentElement.dataset.theme = "light";
      })();
    </script>
    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>
  <body class="auth-pending">
    <div class="noise-overlay"></div>
    <div class="ai-glow-container">
      <div class="ai-glow"></div>
    </div>

    {% include 'components/login.html' %}
    {% include 'components/settings.html' %}

    <main class="shell">
      {% include 'components/topbar.html' %}

      <!-- MAIN WORKSPACE -->
      <div class="workspace">
        <div class="mobile-overlay" id="mobileOverlay" onclick="document.querySelector('.workspace').classList.add('collapsed')"></div>
        {% include 'components/sidebar.html' %}

        <!-- RIGHT: CONTENT -->
        <section class="content-area">
          {% include 'components/meeting.html' %}
          {% include 'components/history.html' %}
        </section>
      </div>
    </main>

    <script src="/static/js/state.js"></script>
    <script src="/static/js/i18n.js"></script>
    <script src="/static/js/dom.js"></script>
    <script src="/static/js/auth.js"></script>
    <script src="/static/js/recording.js"></script>
    <script src="/static/js/ui.js"></script>
    <script src="/static/js/settings.js"></script>
    <script src="/static/js/main.js"></script>
  </body>
</html>
