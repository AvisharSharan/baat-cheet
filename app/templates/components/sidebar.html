        <aside class="sidebar">

          <!-- Step 1: Setup -->
          <div class="sidebar-section">
            <div class="section-header">
              <span class="step-badge">1</span>
              <span class="section-title" data-i18n="setup.title">Setup</span>
            </div>

            <div class="field-group">
              <label class="field-label" for="meetingName" data-i18n="setup.name">Meeting name</label>
              <input id="meetingName" type="text" maxlength="120" placeholder="e.g. Weekly sync" data-i18n="setup.name_ph" />
            </div>

            <div class="field-group">
              <label class="field-label" for="workflowMode" data-i18n="setup.mode">Mode</label>
              <div class="mode-toggle">
                <button class="mode-btn active" data-mode="realtime" type="button">
                  <svg width="13" height="13" viewBox="0 0 13 13"><circle cx="6.5" cy="6.5" r="5" stroke="currentColor" stroke-width="1.3" fill="none"/><circle cx="6.5" cy="6.5" r="2" fill="currentColor"/></svg>
                  <span data-i18n="setup.live">Live</span>
                </button>
                <button class="mode-btn" data-mode="recorded" type="button">
                  <svg width="13" height="13" viewBox="0 0 13 13"><rect x="1.5" y="3" width="7" height="7" rx="1" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M9 5.2l2.5-1.5v5.5L9 7.8" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linejoin="round"/></svg>
                  <span data-i18n="setup.recorded">Recorded</span>
                </button>
              </div>
              <select id="workflowMode" aria-label="Meeting workflow" style="display:none">
                <option value="realtime">Real-time meeting</option>
                <option value="recorded">Recorded media</option>
              </select>
            </div>

            <!-- Realtime settings -->
            <div class="realtime-only">
              <div class="field-group">
                <label class="field-label" for="captureMode" data-i18n="setup.audio_src">Audio source</label>
                <div class="select-wrap">
                  <select id="captureMode" aria-label="Capture source">
                    <option value="meeting" data-i18n="setup.src_meeting">Meeting tab + microphone</option>
                    <option value="microphone" data-i18n="setup.src_mic">Microphone only</option>
                  </select>
                  <svg class="select-caret" width="11" height="11" viewBox="0 0 11 11"><path d="M2 4l3.5 3.5L9 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <div class="field-group">
                <label class="field-label" for="microphoneDevice">Input device</label>
                <div class="select-wrap">
                  <select id="microphoneDevice" aria-label="Input device">
                    <option value="">Default microphone</option>
                  </select>
                  <svg class="select-caret" width="11" height="11" viewBox="0 0 11 11"><path d="M2 4l3.5 3.5L9 4" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                </div>
              </div>
              <label class="toggle-row" for="liveCaptionsToggle">
                <div class="toggle-info">
                  <span class="toggle-name" data-i18n="setup.live_cap">Live captions</span>
                  <span class="toggle-detail" data-i18n="setup.local_prev">Local preview</span>
                </div>
                <input id="liveCaptionsToggle" type="checkbox" checked />
                <span class="pill-switch" aria-hidden="true"></span>
              </label>
            </div>

            <!-- Recorded settings -->
            <div class="recorded-only" hidden>
              <div class="field-group">
                <label class="field-label" for="recordedFile" data-i18n="setup.file_label">Audio or video file</label>
                <div class="file-drop-zone" id="fileDropZone">
                  <input id="recordedFile" type="file" accept="audio/*,video/*,.webm,.m4a,.mp3,.mp4,.wav,.ogg,.mov,.mkv" />
                  <div class="file-drop-inner">
                    <svg width="20" height="20" viewBox="0 0 20 20" fill="none"><path d="M10 2v10M6 6l4-4 4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/><path d="M2 14v2a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
                    <span class="file-drop-label" id="fileDropLabel" data-i18n="setup.file_drop">Drop file or click to browse</span>
                  </div>
                </div>
              </div>
            </div>

            <div class="field-group">
              <label class="field-label" for="speakerCount"><span data-i18n="setup.speakers">Expected speakers</span>
                <span class="field-hint" data-i18n="setup.optional">optional</span>
              </label>
              <input id="speakerCount" type="number" min="1" max="10" step="1" inputmode="numeric" aria-label="Speaker count" placeholder="Auto-detect" data-i18n="setup.auto_detect" />
            </div>

            <label class="toggle-row" for="speakerLabelsToggle">
              <div class="toggle-info">
                <span class="toggle-name" data-i18n="setup.speaker_labels">Speaker labels</span>
                <span class="toggle-detail" data-i18n="setup.diarization">Diarization</span>
              </div>
              <input id="speakerLabelsToggle" type="checkbox" checked />
              <span class="pill-switch" aria-hidden="true"></span>
            </label>
          </div>

          <!-- Step 2: Record -->
          <div class="sidebar-section">
            <div class="section-header">
              <span class="step-badge">2</span>
              <span class="section-title" data-i18n="cap.title">Capture</span>
            </div>

            <div class="capture-controls">
              <button id="startBtn" class="btn btn-record" type="button">
                <span class="record-dot"></span>
                <span data-i18n="cap.start">Start Recording</span>
              </button>
              <button id="stopBtn" class="btn btn-stop" type="button" disabled>
                <svg width="12" height="12" viewBox="0 0 12 12"><rect x="1.5" y="1.5" width="9" height="9" rx="1.5" fill="currentColor"/></svg>
                <span data-i18n="cap.stop">Stop & Finalize</span>
              </button>
              <button id="uploadRecordedBtn" class="btn btn-upload recorded-setting" type="button" hidden disabled>
                <svg width="13" height="13" viewBox="0 0 13 13"><path d="M6.5 1v8M3.5 4l3-3 3 3M1.5 10.5h10" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span data-i18n="cap.upload">Upload & Transcribe</span>
              </button>
            </div>

            <!-- Recording timer shown during recording -->
            <div class="recording-status" id="recordingStatus" hidden>
              <div class="rec-indicator">
                <span class="rec-pulse"></span>
                <span class="rec-label">REC</span>
              </div>
              <span class="rec-timer" id="recTimer">0:00</span>
            </div>

            <!-- Playback after stop -->
            <div id="playbackSection" hidden>
              <audio id="recordingPlayback" controls></audio>
              <a id="downloadRecordingLink" class="btn btn-ghost btn-sm" download="meeting-recording.webm">
                <svg width="12" height="12" viewBox="0 0 12 12"><path d="M6 1v7M3 5.5l3 3 3-3M1 10h10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
                <span data-i18n="cap.download">Download audio</span>
              </a>
            </div>
          </div>

          <!-- Step 3: Label & Minutes -->
          <div class="sidebar-section">
            <div class="section-header">
              <span class="step-badge">3</span>
              <span class="section-title" data-i18n="fin.title">Label & Finalize</span>
            </div>

            <!-- Metrics row -->
            <div class="metrics-row">
              <div class="metric">
                <span class="metric-val" id="speakerMetric">—</span>
                <span class="metric-key" data-i18n="fin.speakers">Speakers</span>
              </div>
              <div class="metric">
                <span class="metric-val" id="turnMetric">—</span>
                <span class="metric-key" data-i18n="fin.turns">Turns</span>
              </div>
              <div class="metric">
                <span class="metric-val" id="wordMetric">—</span>
                <span class="metric-key" data-i18n="fin.words">Words</span>
              </div>
            </div>

            <label class="field-label select-label" for="momType">
              <span data-i18n="fin.type">Meeting type</span>
              <select id="momType" class="select-input">
                <option value="auto" data-i18n="fin.type_auto">Auto-detect</option>
                <option value="government" data-i18n="fin.type_gov">Government / official review</option>
                <option value="review" data-i18n="fin.type_rev">Review / status</option>
                <option value="planning" data-i18n="fin.type_plan">Planning / decision</option>
                <option value="action" data-i18n="fin.type_action">Action tracker</option>
                <option value="general" data-i18n="fin.type_gen">General meeting</option>
              </select>
            </label>

            <button id="momBtn" class="btn btn-minutes" type="button" disabled>
              <svg width="14" height="14" viewBox="0 0 14 14"><path d="M2 3.5h10M2 7h6.5M2 10.5h4.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/><circle cx="11" cy="10.5" r="2" stroke="currentColor" stroke-width="1.3" fill="none"/><path d="M12.5 12l1 1" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>
              <span data-i18n="fin.draft">Draft Minutes</span>
            </button>
            <button id="cancelActionBtn" class="btn btn-cancel" type="button" hidden disabled>
              <svg width="13" height="13" viewBox="0 0 13 13"><path d="M3.5 3.5l6 6M9.5 3.5l-6 6" stroke="currentColor" stroke-width="1.6" stroke-linecap="round"/></svg>
              <span data-i18n="fin.cancel">Cancel current action</span>
            </button>

            <div class="speaker-tools">
              <div id="speakerEditor" class="speaker-editor"></div>
              <div class="speaker-footer" id="speakerFooter" hidden>
                <label class="remember-toggle" for="rememberVoices">
                  <input id="rememberVoices" type="checkbox" disabled title="Voiceprints become available after final transcription" />
                  <span class="remember-knob"></span>
                  <span data-i18n="fin.remember">Remember voices</span>
                </label>
                <button id="saveSpeakersBtn" class="btn btn-ghost btn-sm" type="button" disabled data-i18n="fin.save">Save labels</button>
              </div>
            </div>
          </div>

          <p class="workflow-hint" id="workflowHint" data-i18n="fin.hint">Record or upload meeting audio, then finalize locally with faster-whisper transcription and pyannote diarization.</p>
        </aside>
