      <header class="topbar">
        <div class="global-progress"></div>
        <div class="brand">
          <button id="sidebarToggleBtn" class="icon-btn" type="button" aria-label="Toggle sidebar" title="Toggle Sidebar">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
              <line x1="9" y1="3" x2="9" y2="21"></line>
            </svg>
          </button>
          <div>
            <h1>Verbari.</h1>
          </div>
        </div>

        <nav class="topnav">
          <button id="newMeetingBtn" class="topnav-btn active" type="button">
            <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M7 4.5v5M4.5 7h5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/></svg>
            New Meeting
          </button>
          <button id="historyTabBtn" class="topnav-btn" type="button">
            <svg width="14" height="14" viewBox="0 0 14 14"><circle cx="7" cy="7" r="5.5" stroke="currentColor" stroke-width="1.4" fill="none"/><path d="M7 4v3.5l2 2" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/></svg>
            History
          </button>
        </nav>

        <div class="topbar-right">
          <div class="global-status">
            <span class="global-status-dot"></span>
            <span id="statusText">Ready</span>
          </div>
          <div class="user-chip" id="userChip" hidden></div>
          <button id="logoutBtn" class="btn btn-ghost btn-sm" type="button" hidden>Logout</button>

          <button id="themeToggle" class="icon-btn" type="button" aria-label="Toggle theme">
            <svg class="theme-sun" width="16" height="16" viewBox="0 0 16 16">
              <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4" fill="none"/>
              <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
            <svg class="theme-moon" width="16" height="16" viewBox="0 0 16 16">
              <path d="M13 10.5A6 6 0 0 1 5.5 3a6.2 6.2 0 1 0 7.5 7.5Z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
            </svg>
          </button>
        </div>
      </header>
