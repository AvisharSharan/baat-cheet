    <section id="loginView" class="login-view" aria-live="polite">
      <svg class="doodle-bg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <pattern id="doodlePattern" width="300" height="300" patternUnits="userSpaceOnUse">
            <g stroke="currentColor" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <g transform="translate(30, 40)"><path d="M6 14v2a10 10 0 0 0 20 0v-2M16 26v8M12 34h8"/><rect x="11" y="4" width="10" height="18" rx="5"/></g>
              <g transform="translate(180, 50)"><path d="M14 2v24M14 2H6a2 2 0 0 0-2 2v24a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-6-6Z"/><path d="M14 2v6h6M8 14h8M8 18h8M8 22h4"/></g>
              <g transform="translate(100, 150)"><path d="M4 14v4M12 8v16M20 2v28M28 10v12M36 14v4"/></g>
              <path d="M260 180 l3 8 l8 3 l-8 3 l-3 8 l-3-8 l-8-3 l8-3Z" />
              <path d="M80 250 l2 5 l5 2 l-5 2 l-2 5 l-2-5 l-5-2 l5-2Z" />
              <g transform="translate(200, 220)"><path d="M4 8a8 8 0 0 1 8-8h16a8 8 0 0 1 8 8v10a8 8 0 0 1-8 8h-4l-8 6v-6H12a8 8 0 0 1-8-8Z"/><circle cx="12" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="20" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="28" cy="13" r="1.5" fill="currentColor" stroke="none"/></g>
              <g transform="translate(40, 200)"><circle cx="16" cy="16" r="12" /><path d="M10 16l4 4l8-8" /></g>
            </g>
          </pattern>
        </defs>
        <rect width="100%" height="100%" fill="url(#doodlePattern)"/>
      </svg>
      <div class="login-shell">
        <form id="loginForm" class="login-panel">
          <div class="login-brand-row">
            <div>
              <h1>Verbari.</h1>
            </div>
          </div>

          <div class="login-heading">
            <h2>Sign in</h2>
            <p>Open your meeting workspace.</p>
          </div>

          <div class="login-fields">
            <div class="field-group">
              <label class="field-label" for="loginUsername">Username</label>
              <input id="loginUsername" name="username" type="text" autocomplete="username" placeholder="admin" required />
            </div>
            <div class="field-group">
              <label class="field-label" for="loginPassword">Password</label>
              <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Password" required />
            </div>
          </div>

          <button id="loginBtn" class="btn btn-minutes login-submit" type="submit">
            <span>Sign in</span>
            <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M2 7h9M7.5 3.5 11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <p id="loginError" class="login-error" hidden></p>
        </form>
      </div>
    </section>
