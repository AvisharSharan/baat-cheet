    <section id="loginView" class="login-view" aria-live="polite">
      <div class="login-actions">
        <button id="loginLangToggle" class="icon-btn login-theme-toggle" type="button" aria-label="Toggle language" onclick="toggleLanguage()">
          <span style="font-weight: 600; font-size: 14px;">A/अ</span>
        </button>
        <button id="loginThemeToggle" class="icon-btn login-theme-toggle" type="button" aria-label="Toggle theme">
          <svg class="theme-sun" width="16" height="16" viewBox="0 0 16 16">
            <circle cx="8" cy="8" r="3" stroke="currentColor" stroke-width="1.4" fill="none"/>
            <path d="M8 1.5v2M8 12.5v2M1.5 8h2M12.5 8h2M3.4 3.4l1.4 1.4M11.2 11.2l1.4 1.4M12.6 3.4l-1.4 1.4M4.8 11.2l-1.4 1.4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
          </svg>
          <svg class="theme-moon" width="16" height="16" viewBox="0 0 16 16">
            <path d="M13 10.5A6 6 0 0 1 5.5 3a6.2 6.2 0 1 0 7.5 7.5Z" stroke="currentColor" stroke-width="1.4" fill="none" stroke-linejoin="round"/>
          </svg>
        </button>
      </div>
      <div class="doodle-bg" aria-hidden="true">
        <!-- Microphone -->
        <svg class="doodle-icon doodle-1" width="42" height="42" viewBox="0 0 32 38" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 14v2a10 10 0 0 0 20 0v-2M16 26v8M12 34h8"/><rect x="11" y="4" width="10" height="18" rx="5"/></svg>
        <!-- Document -->
        <svg class="doodle-icon doodle-2" width="36" height="42" viewBox="0 0 24 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2v24M14 2H6a2 2 0 0 0-2 2v24a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V8l-6-6Z"/><path d="M14 2v6h6M8 14h8M8 18h8M8 22h4"/></svg>
        <!-- Waveform -->
        <svg class="doodle-icon doodle-3" width="44" height="36" viewBox="0 0 40 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M4 14v4M12 8v16M20 2v28M28 10v12M36 14v4"/></svg>
        <!-- Sparkle big -->
        <svg class="doodle-icon doodle-4" width="28" height="28" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M11 1 l3 8 l8 3 l-8 3 l-3 8 l-3-8 l-8-3 l8-3Z"/></svg>
        <!-- Chat bubble -->
        <svg class="doodle-icon doodle-5" width="44" height="40" viewBox="0 0 40 34" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 8a8 8 0 0 1 8-8h16a8 8 0 0 1 8 8v10a8 8 0 0 1-8 8h-4l-8 6v-6H12a8 8 0 0 1-8-8Z"/><circle cx="12" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="20" cy="13" r="1.5" fill="currentColor" stroke="none"/><circle cx="28" cy="13" r="1.5" fill="currentColor" stroke="none"/></svg>
        <!-- Checkmark -->
        <svg class="doodle-icon doodle-6" width="36" height="36" viewBox="0 0 32 32" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="16" cy="16" r="12"/><path d="M10 16l4 4l8-8"/></svg>
        <!-- Sparkle small -->
        <svg class="doodle-icon doodle-7" width="20" height="20" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linejoin="round"><path d="M7 1 l2 5 l5 2 l-5 2 l-2 5 l-2-5 l-5-2 l5-2Z"/></svg>
        <!-- Headphones -->
        <svg class="doodle-icon doodle-8" width="38" height="38" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M3 18v-6a9 9 0 0 1 18 0v6"/><path d="M21 19a2 2 0 0 1-2 2h-1a2 2 0 0 1-2-2v-3a2 2 0 0 1 2-2h3zM3 19a2 2 0 0 0 2 2h1a2 2 0 0 0 2-2v-3a2 2 0 0 0-2-2H3z"/></svg>
        <!-- Clock -->
        <svg class="doodle-icon doodle-9" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
        <!-- Pen -->
        <svg class="doodle-icon doodle-10" width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.83 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>
      </div>

      <div class="login-card">
        <!-- Left: Hero / Branding Side -->
        <div class="login-hero">
          <div class="login-hero-content">
            <h1 class="login-logo">बात-Cheet</h1>
            <p class="login-tagline" data-i18n="login.tagline">Your meetings, intelligently documented.</p>

            <div class="login-features">
              <div class="login-feature">
                <div class="login-feature-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="22"/></svg>
                </div>
                <div>
                  <strong data-i18n="login.feat1">Live Transcription</strong>
                  <span data-i18n="login.feat1_sub">Record & transcribe meetings in real-time</span>
                </div>
              </div>
              <div class="login-feature">
                <div class="login-feature-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                </div>
                <div>
                  <strong data-i18n="login.feat2">Speaker Diarization</strong>
                  <span data-i18n="login.feat2_sub">AI identifies who said what</span>
                </div>
              </div>
              <div class="login-feature">
                <div class="login-feature-icon">
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
                </div>
                <div>
                  <strong data-i18n="login.feat3">Auto Minutes</strong>
                  <span data-i18n="login.feat3_sub">Structured MoM drafted by AI</span>
                </div>
              </div>
            </div>
          </div>

          <p class="login-hero-footer" data-i18n="login.footer">Local-first · Privacy-focused</p>
        </div>

        <!-- Right: Form Side -->
        <div class="login-form-side">
          <form id="loginForm" class="login-panel">
            <div class="login-heading">
              <h2 data-i18n="login.title">Welcome back</h2>
              <p data-i18n="login.subtitle">Sign in to your workspace</p>
            </div>

            <div class="login-fields">
              <div class="field-group">
                <label class="field-label" for="loginUsername" data-i18n="login.username">Username</label>
                <input id="loginUsername" name="username" type="text" autocomplete="username" placeholder="admin" required />
              </div>
              <div class="field-group">
                <label class="field-label" for="loginPassword" data-i18n="login.password">Password</label>
                <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="Password" data-i18n="login.password" required />
              </div>
            </div>

            <button id="loginBtn" class="btn btn-minutes login-submit" type="submit">
              <span data-i18n="login.btn">Sign in</span>
              <svg width="14" height="14" viewBox="0 0 14 14" aria-hidden="true"><path d="M2 7h9M7.5 3.5 11 7l-3.5 3.5" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </button>
            <p id="loginError" class="login-error" hidden></p>
          </form>
        </div>
      </div>
    </section>
