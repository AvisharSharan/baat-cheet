          <!-- Meeting view -->
          <div id="meetingView" class="meeting-view show-transcript">
            <!-- Mobile Tabs -->
            <div class="mobile-tabs">
              <button class="mobile-tab active" data-target="transcript" type="button" onclick="switchMobileTab('transcript')" data-i18n="meet.tab_trans">Transcript</button>
              <button class="mobile-tab" data-target="minutes" type="button" onclick="switchMobileTab('minutes')" data-i18n="meet.tab_mom">Draft Minutes</button>
            </div>
            <!-- Transcript panel -->
            <div class="panel panel-transcript">
              <div class="panel-head">
                <div class="panel-title-row">
                  <span class="panel-pulse" id="transcriptDot"></span>
                  <h2 data-i18n="meet.trans_title">Transcript</h2>
                  <span class="panel-badge" id="transcriptBadge" hidden></span>
                  <span class="waveform-strip" aria-hidden="true">
                    <span></span><span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                  </span>
                </div>
              </div>
              <div id="transcript" class="transcript transcript-empty">
                <div class="empty-state">
                  <div class="empty-glyph">
                    <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                      <circle cx="20" cy="20" r="17" stroke="currentColor" stroke-width="1.2" opacity="0.3"/>
                      <path d="M12 20 Q16 13 20 20 Q24 27 28 20" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none" opacity="0.5"/>
                      <circle cx="20" cy="20" r="2.5" fill="currentColor" opacity="0.3"/>
                    </svg>
                  </div>
                  <strong data-i18n="meet.empty_trans">No transcript yet</strong>
                  <span id="emptyTranscriptMsg" data-i18n="meet.empty_trans_sub">Start recording, then stop to finalize with local transcription and diarization.</span>
                </div>
              </div>
            </div>

            <!-- Minutes panel -->
            <div class="panel panel-minutes">
              <div class="panel-head">
                <div class="panel-title-row">
                  <span class="panel-pulse panel-pulse-amber" id="minutesDot"></span>
                  <h2 data-i18n="meet.mom_title">Draft Minutes</h2>
                  <span class="text-flow-strip" aria-hidden="true">
                    <span></span><span></span><span></span>
                  </span>
                </div>
                <div class="panel-head-right">
                  <button id="editMomBtn" class="btn btn-secondary btn-sm" style="display:none;" data-i18n="meet.edit_mom">Edit</button>
                  <button id="saveMomBtn" class="btn btn-primary btn-sm" style="display:none;" data-i18n="meet.save_mom">Save</button>
                  <div class="export-links" id="exportLinks"></div>
                </div>
              </div>
              <pre id="momOutput" class="mom mom-empty" data-i18n="meet.empty_mom">Transcribe the meeting first, then click Draft Minutes to generate AI-powered minutes.</pre>
              <textarea id="momEditArea" class="mom" style="display:none; width: 100%; height: 100%; resize: vertical; min-height: 200px; font-family: 'Space Mono', monospace; padding: 1rem;"></textarea>
            </div>
          </div>
