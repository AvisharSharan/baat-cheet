          <!-- History view -->
          <div id="historyView" class="history-view" hidden>
            <div class="panel panel-history">
              <div class="panel-head">
                <div class="panel-title-row">
                  <span class="panel-pulse panel-pulse-green"></span>
                  <h2 data-i18n="hist.title">Meeting History</h2>
                </div>
                <button id="refreshHistoryBtn" class="btn btn-ghost btn-sm" type="button">
                  <svg width="12" height="12" viewBox="0 0 12 12"><path d="M10.5 6a4.5 4.5 0 1 1-1-2.8" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round"/><path d="M9 1v3h3" stroke="currentColor" stroke-width="1.3" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>

                </div>
              </div>
            </div>
